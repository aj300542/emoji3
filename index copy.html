<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>🫡 Emoji Preview</title>
  <style>
    @font-face {
      font-family: 'SegoeEmojiCustom';
      src: url('font/seguiemj-1.35-flat.ttf') format('truetype');
    }

    body {
      background-color: #f0f0f0;
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .emoji {
      font-family: 'SegoeEmojiCustom', sans-serif;
      font-size: 200px;
      line-height: 1;
      cursor: pointer;
      z-index: 10;
      position: relative;
    }

    .code {
      font-size: 24px;
      margin-top: 10px;
      color: #333;
    }

    #three-canvas {
      position: fixed;
      /* 更稳定的层叠方式 */
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      /* ✅ 不阻挡鼠标事件 */
      z-index: 9999;
      /* ✅ 高于 emoji */
    }
  </style>
</head>

<body>
  <div class="emoji" id="emoji">👨‍🌾</div>
  <div class="code" id="code">U+1FAE1</div>
  <canvas id="three-canvas"></canvas>
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
    "RoomEnvironment": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/environments/RoomEnvironment.js"
  }
}
</script><script type="module">
  import * as THREE from 'three';
  import { MTLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/loaders/MTLLoader.js';
  import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/loaders/OBJLoader.js';
  import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/controls/OrbitControls.js';
  import { RoomEnvironment } from 'RoomEnvironment';

  const canvas = document.getElementById('three-canvas');
  const emoji = document.getElementById('emoji');
  const codeDisplay = document.getElementById('code');

  let renderer, scene, camera, controls;
  let pivot = null;
  let modelLoaded = false;
  let animationFrameId = null;

  function getEmojiCode(emojiChar) {
    return [...emojiChar].map(c => 'U+' + c.codePointAt(0).toString(16).toUpperCase()).join('_');
  }

  function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    const envMap = pmremGenerator.fromScene(new RoomEnvironment(), 0.2).texture;
    scene.environment = envMap;

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(hemi);

    const rimLight = new THREE.DirectionalLight(0xffffff, 1);
    rimLight.position.set(10, 10, 5);
    rimLight.castShadow = true;
    rimLight.shadow.mapSize.width = 1024;
    rimLight.shadow.mapSize.height = 1024;
    rimLight.shadow.camera.near = 0.5;
    rimLight.shadow.camera.far = 50;
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0xffffff, 0.8);
    fillLight.position.set(-5, 5, 5);
    scene.add(fillLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.ShadowMaterial({ opacity: 0.3 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);
  }


  function animate() {
    cancelAnimationFrame(animationFrameId);

    function loop() {
      animationFrameId = requestAnimationFrame(loop);
      if (pivot) {
        pivot.rotation.y += 0.005;
      }
      controls.update();
      renderer.render(scene, camera);
    }
    loop();
  }

  emoji.addEventListener('mouseenter', () => {
    canvas.style.display = 'block';

    const emojiChar = emoji.textContent.trim();
    const code = getEmojiCode(emojiChar);
    codeDisplay.textContent = code;

    if (!scene) {
      initThree();
    }

    if (!modelLoaded) {
      loadModel(code);
    }

    if (pivot) {
      pivot.rotation.y = 0; // ✅ 每次悬浮重置旋转角度
    }

    animate(); // ✅ 每次悬浮都重新启动动画
  });

  emoji.addEventListener('mouseleave', () => {
    canvas.style.display = 'none';
    cancelAnimationFrame(animationFrameId); // ✅ 鼠标移出时停止动画
  });

  window.addEventListener('resize', () => {
    if (camera && renderer) {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  });
</script>


</body>

</html>
